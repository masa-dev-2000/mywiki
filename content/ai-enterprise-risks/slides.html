<h3 id="%E8%91%97%E4%BD%9C%E6%A8%A9%E4%BE%B5%E5%AE%B3%E3%81%AE%E6%80%A5%E5%A2%97">著作権侵害の急増</h3>
<ul>
<li><strong>Anthropic</strong>: 著作者グループとの訴訟で<strong>15億ドル（約2,200億円）で和解</strong>（2025年）</li>
<li><strong>読売新聞vsPerplexity</strong>: 約22億円の損害賠償請求（日本初の大手メディアによるAI提訴）</li>
<li><strong>重要</strong>: 著作権侵害の責任主体は「AI提供企業」でなく「<strong>利用企業</strong>」</li>
</ul>
<h3 id="%E4%BC%81%E6%A5%AD%E3%81%8C%E5%8F%96%E3%82%8B%E3%81%B9%E3%81%8D%E5%AF%BE%E7%AD%96">企業が取るべき対策</h3>
<ol>
<li><strong>ベンダー契約確認</strong>: Microsoft・OpenAI等が提供する「著作権補償プログラム」の有無を確認</li>
<li><strong>AI生成物の人間レビュー</strong>: 出力を「たたき台」として扱い、必ず人間が確認・編集</li>
<li><strong>プロンプト設計</strong>: 特定作家名・スタイル指定を避ける</li>
<li><strong>記録保持</strong>: プロンプトと出力の記録を保存（善意使用の証拠）</li>
</ol>
<footer>企業AI活用のリスクと対策 | 2026-03-24</footer>
