<table>
<thead>
<tr>
<th>セグメント</th>
<th>主な活動</th>
<th>特徴</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>上流</strong> (Upstream)</td>
<td>探鉱・採掘・生産</td>
<td>ハイリスク・ハイリターン。原油価格に大きく連動</td>
</tr>
<tr>
<td><strong>中流</strong> (Midstream)</td>
<td>パイプライン・タンカー輸送・貯蔵</td>
<td>安定収益。長期固定料金契約</td>
</tr>
<tr>
<td><strong>下流</strong> (Downstream)</td>
<td>精製・石油化学・小売</td>
<td>薄利多売。クラックスプレッドが利益源</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>垂直統合型企業</strong>（ExxonMobil, Shell等）が全層を運営しリスク分散</li>
<li>原油価格下落時に上流の減益を下流の精製マージン改善が相殺する構造</li>
</ul>
<footer>石油産業の構造 | 2026-03-25</footer>

<h1 id="%E4%B8%8A%E6%B5%81%E6%8E%A2%E9%89%B1%E3%81%8B%E3%82%89%E7%94%9F%E7%94%A3%E3%81%BE%E3%81%A7">上流：探鉱から生産まで</h1>
<h3 id="%E6%8E%A2%E9%89%B1%E6%8A%80%E8%A1%93%E3%81%AE%E9%80%B2%E5%8C%96%E3%81%8C%E6%8A%95%E8%B3%87%E3%83%AA%E3%82%B9%E3%82%AF%E3%82%92%E5%8A%87%E7%9A%84%E3%81%AB%E4%BD%8E%E6%B8%9B%E3%81%97%E3%81%9F">探鉱技術の進化が投資リスクを劇的に低減した</h3>
<ul>
<li><strong>2D → 3D地震探査</strong>（1970年代後半）：地下の3次元構造を可視化
<ul>
<li>空井戸率が最大 <strong>50%低下</strong></li>
</ul>
</li>
<li><strong>4D地震探査</strong>：時系列で貯留層の変化を把握、投資回収率を最大化</li>
<li><strong>深海掘削技術</strong>：水深3,000m超の開発を可能に（メキシコ湾、ブラジル プレソルト層）</li>
</ul>
<h3 id="%E6%8E%98%E5%89%8A%E6%8A%80%E8%A1%93%E3%81%AE%E7%B3%BB%E8%AD%9C">掘削技術の系譜</h3>
<ul>
<li>1859年：ドレイク油井（深度21m、蒸気機関）</li>
<li>1947年：初の近代オフショア掘削（メキシコ湾）</li>
<li>2000年代：水平掘削+水圧破砕 → <strong>シェール革命</strong></li>
</ul>

<h3 id="%E4%B8%BB%E3%81%AA%E8%BC%B8%E9%80%81%E6%89%8B%E6%AE%B5">主な輸送手段</h3>

<li><strong>パイプライン</strong>：最もコスト効率が高い。米国だけで約250万km超</li>
<li><strong>タンカー</strong>：海上輸送の主力。VLCC（超大型原油タンカー）で1隻200万バレル</li>
<li><strong>鉄道・トラック</strong>：短距離・補助的手段</li>
</ul>
<h3 id="%E4%B8%AD%E6%B5%81%E3%81%AE%E7%89%B9%E5%BE%B4">中流の特徴</h3>
<ul>
<li><strong>テイク・オア・ペイ契約</strong>：利用量に関わらず一定額を支払う仕組み</li>
<li>原油価格変動の影響を受けにくい安定ビジネス</li>
<li><strong>ボトルネック問題</strong>：シェール革命時にパイプライン建設が生産増に追いつかず、ガスフレアリング率が上昇</li>
</ul>

<h1 id="%E4%B8%8B%E6%B5%81%E7%B2%BE%E8%A3%BD%E3%81%8B%E3%82%89%E6%B6%88%E8%B2%BB%E8%80%85%E3%81%BE%E3%81%A7">下流：精製から消費者まで</h1>
<h3 id="%E7%B2%BE%E8%A3%BD%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF">精製の仕組み</h3>
<ol>
<li><strong>常圧蒸留</strong>（CDU）：原油を約400℃に加熱し、沸点差で留分を分離
<ul>
<li>ナフサ、灯油、軽油、重油 等</li>
</ul>
</li>
<li><strong>分解</strong>（クラッキング）：重質留分を軽質化</li>
<li><strong>脱硫・改質</strong>：環境規制に適合する品質に仕上げ</li>
</ol>
<h3 id="%E5%88%A9%E7%9B%8A%E3%81%AE%E6%BA%90%E6%B3%89">利益の源泉</h3>
<ul>
<li><strong>クラックスプレッド</strong> = 製品販売価格 − 原油購入価格</li>
<li>代表的指標：3:2:1スプレッド（原油3バレル → ガソリン2 + ディーゼル1）</li>
</ul>
<h3 id="%E5%A4%89%E5%8C%96%E3%81%AE%E5%85%86%E3%81%97">変化の兆し</h3>
<ul>
<li>精製マージンは2022年ピークから<strong>約60%減少</strong>（2024年）</li>
<li>新設製油所は<strong>石油化学統合型</strong>が主流に</li>
</ul>

<h3 id="%E3%82%B3%E3%82%A2%E6%8A%80%E8%A1%93">コア技術</h3>
<ul>
<li><strong>水平掘削</strong>（horizontal drilling）：地層に沿って水平に掘り進む</li>
<li><strong>水圧破砕</strong>（hydraulic fracturing）：高圧水で岩盤を破砕し、閉じ込められた石油・ガスを解放</li>
</ul>
<h3 id="%E9%A9%9A%E7%95%B0%E7%9A%84%E3%81%AA%E5%8A%B9%E7%8E%87%E6%94%B9%E5%96%84">驚異的な効率改善</h3>
<ul>
<li>掘削期間：<strong>90日 → 約20日</strong>（2008年→現在）</li>
<li>1地点から複数井戸を掘削、地上占有面積を<strong>最大90%削減</strong></li>
</ul>
<h3 id="%E7%94%9F%E7%94%A3%E9%87%8F%E3%81%AE%E7%88%86%E7%99%BA%E7%9A%84%E5%A2%97%E5%8A%A0">生産量の爆発的増加</h3>
<ul>
<li>米国シェールオイル：日量<strong>50万バレル</strong>（2008年）→ <strong>840万バレル</strong>（2023年）</li>

</ul>

<h1 id="%E3%82%B7%E3%82%A7%E3%83%BC%E3%83%AB%E9%9D%A9%E5%91%BD%E3%81%8Copec%E3%81%AE%E3%82%B2%E3%83%BC%E3%83%A0%E3%81%AE%E3%83%AB%E3%83%BC%E3%83%AB%E3%82%92%E5%A4%89%E3%81%88%E3%81%9F">シェール革命がOPECの「ゲームのルール」を変えた</h1>
<h3 id="%E5%BE%93%E6%9D%A5%E3%81%AE%E5%B8%82%E5%A0%B4%E6%A7%8B%E9%80%A0">従来の市場構造</h3>
<ul>
<li>OPECが減産 → 価格上昇 → 他国は追随するか傍観</li>
</ul>
<h3 id="%E3%82%B7%E3%82%A7%E3%83%BC%E3%83%AB%E5%BE%8C%E3%81%AE%E5%B8%82%E5%A0%B4%E6%A7%8B%E9%80%A0">シェール後の市場構造</h3>
<ul>
<li>OPECが減産 → 価格上昇 → <strong>米国シェールが増産してシェアを奪う</strong></li>
<li>OPECが増産 → 価格下落 → <strong>全員が損をする</strong></li>
</ul>
<h3 id="2014%E5%B9%B4%E3%81%AE%E4%BE%A1%E6%A0%BC%E6%88%A6%E4%BA%89">2014年の価格戦争</h3>
<ul>
<li>OPECが減産拒否、低価格でシェール生産者の排除を狙う</li>
<li>しかしシェール産業は急速なコスト削減で生き残り</li>
<li>結果：<strong>OPEC+体制</strong>（ロシア等を含む枠組み）の形成へ</li>
</ul>
<blockquote>
<p>シェール生産のリードタイムは<strong>12〜18ヶ月</strong>（従来型は5〜8年）。この応答速度がOPECの伝統的な供給管理を根本から脅かしている。</p>
</blockquote>

<h1 id="opec%E3%81%AF%E3%81%A9%E3%81%86%E3%82%84%E3%81%A3%E3%81%A6%E5%B8%82%E5%A0%B4%E3%81%AB%E5%BD%B1%E9%9F%BF%E5%8A%9B%E3%82%92%E8%A1%8C%E4%BD%BF%E3%81%99%E3%82%8B%E3%81%AE%E3%81%8B">OPEC+はどうやって市場に影響力を行使するのか</h1>
<h3 id="3%E3%81%A4%E3%81%AE%E5%BD%B1%E9%9F%BF%E5%8A%9B%E3%83%AC%E3%83%90%E3%83%BC">3つの影響力レバー</h3>
<p><strong>1. 生産割当（クォータ）制度</strong></p>
<ul>
<li>加盟国に生産目標を設定し、供給量を調整</li>
<li>世界の原油生産量の**約40%**をカバー</li>
</ul>
<p><strong>2. 余剰生産能力（スペアキャパシティ）</strong></p>
<ul>
<li>サウジアラビアが世界最大の余剰能力を保持（<strong>180〜200万bpd</strong>）</li>
<li>原油市場における「中央銀行」的な役割</li>
</ul>
<p><strong>3. 監視・コンプライアンス体制</strong></p>
<ul>
<li>合同閣僚監視委員会（JMMC）が各国の実生産量を追跡</li>
<li>ただし<strong>正式な制裁メカニズムは存在しない</strong></li>
</ul>

<h3 id="%E5%88%B6%E5%BA%A6%E7%9A%84%E5%BC%B1%E3%81%95%E3%81%A8%E6%A7%8B%E9%80%A0%E7%9A%84%E5%BC%B7%E3%81%BF%E3%81%8C%E5%85%B1%E5%AD%98">制度的弱さと構造的強みが共存</h3>

<li>2020年1月〜2025年3月の累積超過生産：<strong>約17億バレル</strong></li>

<li>当初計画の<strong>3倍の増産</strong>を実施</li>

<h1 id="%E7%9F%B3%E6%B2%B9%E7%94%A3%E6%A5%AD%E3%81%AE%E6%A7%8B%E9%80%A0%E3%82%92%E7%90%86%E8%A7%A3%E3%81%99%E3%82%8B3%E3%81%A4%E3%81%AE%E9%8D%B5">石油産業の構造を理解する3つの鍵</h1>
<h3 id="1-%E3%83%90%E3%83%AA%E3%83%A5%E3%83%BC%E3%83%81%E3%82%A7%E3%83%BC%E3%83%B3%E3%81%AE3%E5%B1%A4%E6%A7%8B%E9%80%A0">1. バリューチェーンの3層構造</h3>
<ul>
<li>上流（ハイリスク・ハイリターン）・中流（安定インフラ）・下流（薄利・転換期）</li>
<li>垂直統合がリスク分散の基本戦略</li>
</ul>
<h3 id="2-%E6%A8%A9%E5%8A%9B%E7%A7%BB%E8%A1%8C%E3%81%AE3%E6%AE%B5%E9%9A%8E">2. 権力移行の3段階</h3>
<ul>
<li>セブン・シスターズ（IOC）→ OPEC（産油国連合）→ NOC（国営石油会社）</li>
<li>現在の勢力図：NOCが埋蔵量90%超、OPEC+が供給の40%</li>
</ul>
<h3 id="3-%E5%A4%89%E5%8C%96%E3%81%AE3%E6%96%B9%E5%90%91">3. 変化の3方向</h3>
<ul>
<li><strong>燃料 → 素材</strong>：石油化学が将来の需要の柱に</li>
<li><strong>IOC → NOC</strong>：技術格差の縮小、IOCはサービス提供者化</li>
<li><strong>一極 → 多極</strong>：シェール革命でOPEC一極支配が終焉</li>
</ul>
<footer>石油産業の構造 | 2026-03-25</footer>
