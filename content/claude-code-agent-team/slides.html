<li><strong>視点の偏り</strong>: 1つのエージェントは1つの仮説に固執しがち</li>
<li><strong>開発者限定</strong>: ターミナルベースのツールは非開発者には使えない</li>
</ul>

<h1 id="mcp-%E5%A4%96%E9%83%A8%E3%83%84%E3%83%BC%E3%83%AB%E3%81%A8%E3%81%AE%E6%8E%A5%E7%B6%9A%E3%83%97%E3%83%AD%E3%83%88%E3%82%B3%E3%83%AB">MCP: 外部ツールとの接続プロトコル</h1>
<p><strong>MCP（Model Context Protocol）</strong> = AIと外部サービスをつなぐ標準規格</p>
<ul>
<li><strong>接続先例</strong>: GitHub, Slack, PostgreSQL, ブラウザ, Notion, Jira...</li>
<li>ツール検索: コンテキストの<strong>10%まで自動ロード</strong>、残りはオンデマンド</li>
<li><strong>スコープ階層</strong>: local &gt; project &gt; user（上書き可能）</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-comment">// settings.json</span>
<span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;mcpServers&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;github&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;npx&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;args&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;-y&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;@modelcontextprotocol/server-github&quot;</span><span class="hljs-punctuation">]</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;postgres&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;npx&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;args&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;-y&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;@modelcontextprotocol/server-postgres&quot;</span><span class="hljs-punctuation">]</span> <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>

<h1 id="subagents-%E9%9A%94%E9%9B%A2%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E3%81%A7%E4%B8%A6%E5%88%97%E4%BD%9C%E6%A5%AD%E3%81%99%E3%82%8B%E5%AD%90%E3%82%A8%E3%83%BC%E3%82%B8%E3%82%A7%E3%83%B3%E3%83%88">Subagents: 隔離コンテキストで並列作業する子エージェント</h1>
<ul>
<li><strong>親エージェントが生成</strong> → 独立コンテキストで作業 → <strong>結果サマリーのみ返却</strong></li>
<li>メインのコンテキストウィンドウを消費しない</li>
<li><strong>ネスト不可</strong>（無限再帰防止）</li>
<li>Skillsをプリロード可能</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># カスタムSubagent定義（.claude/agents/security-reviewer.md）
---
name: security-reviewer
description: セキュリティ観点でコードレビューする専門エージェント
skills:
  - owasp-checklist
---
</code></pre>
<blockquote>
<p><strong>重要</strong>: Subagentsは結果を返すだけ。相互通信はできない。</p>
</blockquote>
<footer>Claude Code Agent Teams &amp; Cowork | 2026-03-25</footer>

<h1 id="subagents-vs-agent-teams-%E3%81%84%E3%81%A4%E3%81%A9%E3%81%A1%E3%82%89%E3%82%92%E4%BD%BF%E3%81%86%E3%81%8B">Subagents vs Agent Teams: いつどちらを使うか</h1>
<table>
<thead>
<tr>
<th></th>
<th>Subagents</th>
<th>Agent Teams</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>コンテキスト</strong></td>
<td>独自。結果が親に返る</td>
<td>独自。完全に独立</td>
</tr>
<tr>
<td><strong>通信</strong></td>
<td>親への報告のみ</td>
<td>チームメイト間で直接メッセージ</td>
</tr>
<tr>
<td><strong>調整</strong></td>
<td>親が全管理</td>
<td>共有タスクリストで自己調整</td>
</tr>
<tr>
<td><strong>最適用途</strong></td>
<td>結果だけが必要な集中タスク</td>
<td>議論・協調が必要な複雑な作業</td>
</tr>
<tr>
<td><strong>トークンコスト</strong></td>
<td>低: サマリーのみ返却</td>
<td>高: 各メンバーが独立インスタンス</td>
</tr>
</tbody>
</table>
<p><strong>移行ポイント</strong>: Subagents並列実行でコンテキスト不足、または子エージェント間の通信が必要 → Agent Teams</p>

<h1 id="agent-teams%E3%81%AE%E8%A1%A8%E7%A4%BA%E3%83%A2%E3%83%BC%E3%83%89%E3%81%A8%E6%93%8D%E4%BD%9C%E6%96%B9%E6%B3%95">Agent Teamsの表示モードと操作方法</h1>
<p><strong>2つの表示モード:</strong></p>
<table>
<thead>
<tr>
<th>モード</th>
<th>特徴</th>
<th>切替方法</th>
</tr>
</thead>
<tbody>
<tr>

<td>全チームメイトが1ターミナル内</td>
<td>Shift+Down で切替</td>
</tr>
<tr>
<td><strong>Split-pane</strong></td>
<td>各チームメイトが独自ペイン</td>
<td>tmux / iTerm2 必要</td>
</tr>
</tbody>
</table>
<p><strong>チームメイトへの直接操作:</strong></p>
<ul>
<li><strong>Shift+Down</strong>: チームメイト間を巡回（In-process）</li>
<li><strong>Enter</strong>: チームメイトのセッションを表示</li>
<li><strong>Escape</strong>: 現在のターンを中断</li>
<li><strong>Ctrl+T</strong>: タスクリスト表示切替</li>
<li><strong>クリック</strong>: ペインに入って直接操作（Split-pane）</li>
</ul>

<h1 id="agent-teams%E3%81%AE%E9%AB%98%E5%BA%A6%E3%81%AA%E6%A9%9F%E8%83%BD">Agent Teamsの高度な機能</h1>
<p><strong>計画承認の強制:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>認証モジュールのリファクタリングを担当するarchitectチームメイトを生成。

</code></pre>
<p>→ チームメイトは読み取り専用のPlanモードで作業 → リード承認後に実装開始</p>
<p><strong>品質ゲート（Hooks）:</strong></p>
<ul>
<li><code>TeammateIdle</code>: チームメイト待機時に自動フィードバック（exit code 2で作業続行指示）</li>
<li><code>TaskCompleted</code>: タスク完了時に品質チェック（exit code 2で完了拒否・差し戻し）</li>
</ul>
<p><strong>モデル指定:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>4人のチームメイトでモジュールを並列リファクタリング。
各チームメイトにはSonnetを使って。
</code></pre>

<li><strong>「この設定を他のプロジェクトでも」</strong> → <strong>Plugins</strong></li>
</ul>

<h1 id="%E6%B3%A8%E6%84%8F%E7%82%B9%E3%81%A8%E5%88%B6%E9%99%90%E4%BA%8B%E9%A0%85">注意点と制限事項</h1>
<table>
<thead>
<tr>
<th>項目</th>
<th>詳細</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Agent Teams</strong></td>
<td>実験的機能。セッション復旧不可、ネストチーム不可、リーダー固定</td>
</tr>
<tr>
<td><strong>Claude Cowork</strong></td>
<td>リサーチプレビュー。監査ログ未対応、規制ワークロード不可</td>
</tr>
<tr>
<td><strong>トークンコスト</strong></td>
<td>Agent Teamsはチームサイズに比例。3-5人で開始推奨</td>
</tr>
<tr>
<td><strong>Computer Use</strong></td>
<td>macOS限定、セキュリティリスクあり。アプリアクセスに毎回許可必要</td>
</tr>
<tr>
<td><strong>Split-pane</strong></td>
<td>tmux/iTerm2必要。VS Code Terminal、Windows Terminal非対応</td>
</tr>
<tr>
<td><strong>Auto Dream</strong></td>
<td>2026年3月〜。長期利用でのメモリ管理を改善するが新機能</td>
</tr>
</tbody>
</table>
<footer>Claude Code Agent Teams &amp; Cowork | 2026-03-25</footer>
