<p><strong>コンテキストウィンドウは最も重要なリソース</strong></p>
<table>
<thead>
<tr>
<th>使用率</th>
<th>状態</th>
</tr>

<tr>
<td>85-90%</td>
<td><strong>幻覚増加</strong> → <code>/compact</code> 必須</td>
</tr>
<tr>

<td><strong>動作不安定</strong> → <code>/clear</code> 必須</td>
</tr>

</table>
<p><strong>実践テクニック</strong></p>
<ul>
<li><code>/clear</code> — タスク間でコンテキストリセット（<strong>最重要習慣</strong>）</li>

<li><code>/btw</code> — コンテキストに残らないサイドクエスチョン</li>
<li><strong>サブエージェント</strong> — 調査を別コンテキストで実行（本体を汚さない）</li>

<h1 id="git-worktree%E3%81%A7%E4%B8%A6%E5%88%97%E5%AE%9F%E8%A1%8C">Git Worktreeで並列実行</h1>
<p><strong>各セッションが独立した作業ディレクトリを取得</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Worktreeを使って新セッション起動</span>
claude --worktree

<span class="hljs-comment"># または手動で</span>
git worktree add ../feature-auth -b feature/auth
<span class="hljs-built_in">cd</span> ../feature-auth &amp;&amp; claude
</code></pre>
<p><strong>実績</strong>: 5エージェント並列で<strong>吞吐量約5倍</strong></p>
<p><strong>推奨パターン</strong></p>
<ul>
<li><strong>Writer/Reviewer</strong>: セッションAで実装、セッションBでレビュー</li>
<li><strong>TDD分離</strong>: セッションAでテスト作成、セッションBで実装</li>
